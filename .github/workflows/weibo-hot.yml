name: 微博热搜手动补采

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weibo-hot-manual
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: 检出 Hexo 源码
        uses: actions/checkout@v7
        with:
          ref: hexo_v2.0
          fetch-depth: 0

      - name: 配置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/requirements-weibo.txt

      - name: 安装采集依赖
        run: python -m pip install -r tools/requirements-weibo.txt

      - name: 采集微博热搜
        run: python tools/weibo_hot.py

      - name: 提交本小时数据
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- source/toplist/data
          if git diff --cached --quiet; then
            echo "本小时数据没有变化，无需提交。"
          else
            git commit -m "自动更新微博热搜 $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')"
            git push origin HEAD:hexo_v2.0
          fi
