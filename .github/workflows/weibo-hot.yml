name: 微博热搜定时采集与发布

on:
  push:
    branches:
      - hexo_v2.0
    paths:
      - "source/toplist/data/WB_Top_*.md"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: weibo-hot-and-pages
  cancel-in-progress: false

jobs:
  collect-build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出 Hexo 源码
        uses: actions/checkout@v7
        with:
          ref: hexo_v2.0
          fetch-depth: 0

      - name: 判断是否需要手动采集
        id: archive
        shell: bash
        run: |
          archive_path="source/toplist/data/WB_Top_$(TZ=Asia/Shanghai date '+%Y%m%d_%H').md"
          echo "path=$archive_path" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_collect=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_collect=false" >> "$GITHUB_OUTPUT"
            echo "由本机推送触发：仅构建和发布，不执行远程采集。"
          fi

      - name: 配置 Python
        if: steps.archive.outputs.should_collect == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/requirements-weibo.txt

      - name: 安装采集依赖
        if: steps.archive.outputs.should_collect == 'true'
        run: python -m pip install -r tools/requirements-weibo.txt

      - name: 采集微博热搜
        if: steps.archive.outputs.should_collect == 'true'
        run: python tools/weibo_hot.py

      - name: 提交本小时数据
        if: steps.archive.outputs.should_collect == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add source/toplist/data/WB_Top_*.md
          if git diff --cached --quiet; then
            echo "本小时数据没有变化，无需提交。"
          else
            git commit -m "自动更新微博热搜 $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')"
            git push origin HEAD:hexo_v2.0
          fi

      - name: 配置 Node.js
        if: steps.archive.outputs.should_collect == 'true' || github.event_name == 'push'
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: 构建 Hexo
        if: steps.archive.outputs.should_collect == 'true' || github.event_name == 'push'
        run: |
          npm ci
          npm run clean
          npm run build

      - name: 配置 GitHub Pages
        if: steps.archive.outputs.should_collect == 'true' || github.event_name == 'push'
        uses: actions/configure-pages@v6

      - name: 上传 Pages 构建产物
        if: steps.archive.outputs.should_collect == 'true' || github.event_name == 'push'
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: 发布 GitHub Pages
        if: steps.archive.outputs.should_collect == 'true' || github.event_name == 'push'
        id: deployment
        uses: actions/deploy-pages@v5
