name: 微博热搜定时采集与发布

on:
  schedule:
    # GitHub Actions 使用 UTC；每小时第 17 分钟运行可避开整点高峰。
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: weibo-hot-and-pages
  cancel-in-progress: false

jobs:
  collect-build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出 Hexo 源码
        uses: actions/checkout@v7
        with:
          ref: hexo_v2.0
          fetch-depth: 0

      - name: 配置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/requirements-weibo.txt

      - name: 安装采集依赖
        run: python -m pip install -r tools/requirements-weibo.txt

      - name: 采集微博热搜
        run: python tools/weibo_hot.py

      - name: 提交本小时数据
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add source/toplist/data/WB_Top_*.md
          if git diff --cached --quiet; then
            echo "本小时数据没有变化，无需提交。"
          else
            git commit -m "自动更新微博热搜 $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')"
            git push origin HEAD:hexo_v2.0
          fi

      - name: 配置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: 构建 Hexo
        run: |
          npm ci
          npm run clean
          npm run build

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v6

      - name: 上传 Pages 构建产物
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: 发布 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
