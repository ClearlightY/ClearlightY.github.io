name: 网站自动构建与发布

on:
  push:
    branches:
      - hexo_v2.0
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出 Hexo 源码
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 配置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: 安装依赖并构建
        run: |
          npm ci
          npm run clean
          npm run build

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v6

      - name: 上传 Pages 构建产物
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: 发布 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
